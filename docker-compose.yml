services:
  melody:
    build: .
    container_name: melody
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - melody-buffer:/tmp/melody-buffer
    # Outbound-only: connects to external Mumble and Subsonic servers
    read_only: false
    tmpfs:
      - /tmp:size=64M

volumes:
  melody-buffer:
